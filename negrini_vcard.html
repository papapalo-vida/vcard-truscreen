<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Valeria Negrini — TruScreen</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;500&family=Poppins:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root{
    --magenta:    #A2017A;  /* accento primario: logo-accent, icone, divisori, angoli QR, job-title */
    --magenta-lt: #C43A9E;  /* magenta chiaro per la barra shimmer */
    --viola:      #770F5C;  /* nome e heading, accento scuro */
    --teal:       #025D7A;  /* pulsante CTA "Scarica .vcf" */
    --teal-dk:    #01475D;  /* CTA hover */
    --rosa:       #F1E3E2;  /* sfondo pannello destro (QR/hero) */
    --panna:      #F3F2EE;  /* sfondo pagina */
    --ink:        #241726;  /* testo corpo */
    --warm-gray:  #8A7F86;  /* testo secondario / corsivo */
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: var(--panna);
    background-image:
      radial-gradient(ellipse 80% 60% at 20% 10%, rgba(162,1,122,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 85% 90%, rgba(162,1,122,0.05) 0%, transparent 55%);
    font-family: 'Montserrat', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 20px;
    gap: 40px;
  }

  .card {
    width: min(760px, 100%);
    background: #FFFFFF;
    border-radius: 3px;
    box-shadow:
      0 2px 6px rgba(26,18,8,0.06),
      0 12px 40px rgba(26,18,8,0.10),
      0 0 0 1px rgba(139,26,26,0.08);
    display: grid;
    grid-template-columns: 1fr 1px 220px;
    overflow: hidden;
    position: relative;
    animation: rise 0.9s cubic-bezier(0.22,1,0.36,1) both;
  }

  @keyframes rise {
    from { opacity:0; transform: translateY(28px); }
    to   { opacity:1; transform: translateY(0); }
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--viola), var(--magenta), var(--teal), var(--magenta), var(--viola));
    background-size: 200%;
    animation: shimmer 4s ease-in-out infinite alternate;
  }
  @keyframes shimmer {
    from { background-position: 0% 50%; }
    to   { background-position: 100% 50%; }
  }

  .left {
    padding: 52px 44px 44px;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .logo-row {
    display: flex;
    align-items: center;
    margin-bottom: 14px;
    animation: rise 0.9s 0.1s cubic-bezier(0.22,1,0.36,1) both;
  }

  .logo-row img {
    height: 56px;
    width: auto;
    display: block;
  }

  .divider-h {
    width: 207px;
    height: 1.5px;
    background: var(--magenta);
    margin-bottom: 14px;
    animation: rise 0.9s 0.2s cubic-bezier(0.22,1,0.36,1) both;
  }

  .name-block {
    animation: rise 0.9s 0.25s cubic-bezier(0.22,1,0.36,1) both;
    margin-bottom: 2px;
  }
  .name-prefix {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 13px;
    color: var(--warm-gray);
    letter-spacing: 0.06em;
  }
  .name-full {
    font-family: 'Poppins', sans-serif;
    font-size: 26px;
    font-weight: 400;
    color: var(--viola);
    letter-spacing: 0.01em;
    line-height: 1.15;
  }
  .name-full strong { font-weight: 400; }

  .title-block {
    margin-top: 6px;
    animation: rise 0.9s 0.3s cubic-bezier(0.22,1,0.36,1) both;
  }
  .job-title {
    font-family: 'Montserrat', sans-serif;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--magenta);
    margin-bottom: 2px;
  }
  .office-name {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 17px;
    color: var(--warm-gray);
    letter-spacing: 0.04em;
  }

  .contacts {
    margin-top: auto;
    padding-top: 48px;
    display: flex;
    flex-direction: column;
    gap: 5px;
    animation: rise 0.9s 0.4s cubic-bezier(0.22,1,0.36,1) both;
  }

  .contact-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .contact-icon {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 1px solid rgba(139,26,26,0.15);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background 0.25s, border-color 0.25s;
  }
  .contact-row:hover .contact-icon {
    background: var(--magenta);
    border-color: var(--magenta);
  }
  .contact-icon svg { width: 12px; height: 12px; }
  .contact-row:hover .contact-icon svg path,
  .contact-row:hover .contact-icon svg rect,
  .contact-row:hover .contact-icon svg circle,
  .contact-row:hover .contact-icon svg polyline,
  .contact-row:hover .contact-icon svg line {
    stroke: #fff;
  }
  .contact-icon svg path,
  .contact-icon svg rect,
  .contact-icon svg circle,
  .contact-icon svg polyline,
  .contact-icon svg line {
    stroke: var(--magenta);
    fill: none;
    stroke-width: 1.6;
    stroke-linecap: round;
    stroke-linejoin: round;
    transition: stroke 0.25s;
  }
  .contact-text {
    font-family: 'Montserrat', sans-serif;
    font-size: 11.5px;
    font-weight: 300;
    color: var(--ink);
    letter-spacing: 0.03em;
    text-decoration: none;
    transition: color 0.2s;
  }
  .contact-text:hover { color: var(--magenta); }

  .divider-v {
    background: linear-gradient(
      to bottom,
      transparent 0%,
      rgba(139,26,26,0.12) 20%,
      rgba(139,26,26,0.18) 50%,
      rgba(139,26,26,0.12) 80%,
      transparent 100%
    );
    width: 1px;
    align-self: stretch;
  }

  .right {
    padding: 44px 30px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    background: var(--rosa);
    animation: rise 0.9s 0.2s cubic-bezier(0.22,1,0.36,1) both;
  }

  .qr-label {
    font-family: 'Montserrat', sans-serif;
    font-size: 8px;
    font-weight: 500;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--warm-gray);
    text-align: center;
  }

  .qr-frame {
    position: relative;
    padding: 12px;
    background: #fff;
    border-radius: 4px;
    box-shadow: 0 4px 20px rgba(26,18,8,0.08), 0 0 0 1px rgba(139,26,26,0.06);
  }
  .qr-frame::before, .qr-frame::after {
    content: '';
    position: absolute;
    width: 18px; height: 18px;
    border-color: var(--magenta);
    border-style: solid;
  }
  .qr-frame::before { top: 4px; left: 4px;  border-width: 2px 0 0 2px; border-radius: 2px 0 0 0; }
  .qr-frame::after  { bottom: 4px; right: 4px; border-width: 0 2px 2px 0; border-radius: 0 0 2px 0; }

  #qrcode img {
    display: block;
    width: 150px;
    height: 150px;
    border-radius: 2px;
  }

  .qr-sub {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 11px;
    color: var(--warm-gray);
    text-align: center;
    letter-spacing: 0.04em;
    line-height: 1.5;
    max-width: 160px;
  }

  .save-btn {
    margin-top: 4px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 9px 18px;
    background: var(--teal);
    color: #fff;
    border: none;
    border-radius: 2px;
    font-family: 'Montserrat', sans-serif;
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.2s, transform 0.15s;
    box-shadow: 0 2px 10px rgba(2,93,122,0.25);
  }
  .save-btn:hover {
    background: var(--teal-dk);
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(2,93,122,0.35);
  }
  .save-btn svg { width: 12px; height: 12px; }
  .save-btn svg path { stroke: #fff; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

  @media (max-width: 600px) {
    .card { grid-template-columns: 1fr; }
    .divider-v { display: none; }
    .right { border-top: 1px solid rgba(139,26,26,0.1); }
  }
</style>
</head>
<body>

<div class="card">
  <div class="left">
    <div class="logo-row">
      <img src="assets/truscreen_logo.png" alt="TruScreen" />
    </div>

    <div class="divider-h"></div>

    <div class="name-block">
      <div class="name-prefix"></div>
      <div class="name-full">Valeria <strong>Negrini</strong></div>
    </div>

    <div class="title-block">
      <div class="job-title">Field Training Manager EU</div>
      <div class="office-name">TruScreen Pty Limited</div>
    </div>

    <div class="contacts">
      <div class="contact-row">
        <div class="contact-icon">
          <svg viewBox="0 0 16 16"><path d="M3 2h3l1 4-2 1a8 8 0 0 0 4 4l1-2 4 1v3a1 1 0 0 1-1 1A12 12 0 0 1 2 3a1 1 0 0 1 1-1z"/></svg>
        </div>
        <a href="tel:+393381477262" class="contact-text">+39 338 1477262</a>
      </div>
      <div class="contact-row">
        <div class="contact-icon">
          <svg viewBox="0 0 16 16"><path d="M2 4l6 5 6-5M2 4h12v9H2z"/></svg>
        </div>
        <a href="mailto:valeria.negrini@truscreen.com" class="contact-text">valeria.negrini@truscreen.com</a>
      </div>
      <div class="contact-row">
        <div class="contact-icon">
          <svg viewBox="0 0 16 16"><circle cx="8" cy="8" r="6"/><path d="M8 2a6 6 0 0 1 2 4.5c0 2-1 3.5-2 3.5s-2-1.5-2-3.5A6 6 0 0 1 8 2z"/><path d="M2 8h12"/></svg>
        </div>
        <a href="https://www.truscreen.com" target="_blank" class="contact-text">www.truscreen.com</a>
      </div>
      <div class="contact-row" style="align-items:flex-start;">
        <div class="contact-icon">
          <svg viewBox="0 0 16 16"><path d="M8 1.5a4.5 4.5 0 0 0-4.5 4.5c0 3.5 4.5 8.5 4.5 8.5s4.5-5 4.5-8.5A4.5 4.5 0 0 0 8 1.5z"/><circle cx="8" cy="6" r="1.6"/></svg>
        </div>
        <div class="contact-text">Level 1, 1 Jamison Street<br>Sydney NSW 2000<br>GPO Box 3904, Sydney NSW 2001</div>
      </div>
    </div>
  </div>

  <div class="divider-v"></div>

  <div class="right">
    <div class="qr-label">Save contact</div>
    <div class="qr-frame">
      <div id="qrcode">
        <img src="assets/negrini_vcard_qr.png" alt="QR vCard Valeria Negrini" />
      </div>
    </div>
    <div class="qr-sub">Scan with your camera to save the contact</div>
    <a href="#" class="save-btn" id="downloadVcf">
      <svg viewBox="0 0 16 16"><path d="M8 2v8M5 7l3 3 3-3M3 12h10"/></svg>
      Download .vcf
    </a>
  </div>
</div>

<script>
  const vcard = [
    'BEGIN:VCARD',
    'VERSION:3.0',
    'N:Negrini;Valeria;;;',
    'FN:Valeria Negrini',
    'ORG:TruScreen Pty Limited',
    'TITLE:Field Training Manager EU',
    'TEL;TYPE=CELL:+393381477262',
    'EMAIL;TYPE=WORK:valeria.negrini@truscreen.com',
    'URL:https://www.truscreen.com',
    'ADR;TYPE=WORK:;;Level 1\\, 1 Jamison Street;Sydney;NSW;2000;Australia',
    'ADR;TYPE=POSTAL:GPO Box 3904;;;Sydney;NSW;2001;Australia',
    'END:VCARD'
  ].join('\r\n');

  document.getElementById('downloadVcf').addEventListener('click', function(e) {
    e.preventDefault();
    const blob = new Blob([vcard], { type: 'text/vcard;charset=utf-8' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url;
    a.download = 'Negrini_Valeria_TruScreen.vcf';
    a.click();
    URL.revokeObjectURL(url);
  });
</script>
</body>
</html>
